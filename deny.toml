# cargo-deny configuration. `cargo xtask layering-test` verifies the `wrappers`
# semantics against the installed cargo-deny by accepting the adapter path and
# rejecting an ephemeral core-crate violation.
#
# This file implements AGENTS.md §8 invariant 2 ("vendor semantics stay in their
# adapter") and §8 invariant 9 (no panicking paths outside tests, via clippy —
# not here). It is part of the enforcement surface, so AGENTS.md §13.3 applies:
# weakening a rule here is a rule change wearing a config file.

[graph]
all-features = true

[licenses]
version = 2
allow = ["Apache-2.0", "MIT", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-3.0"]
confidence-threshold = 0.9
# Bootstrap has no third-party graph yet. Keep the complete policy without
# emitting a warning merely because an allowed license has not appeared.
unused-allowed-license = "allow"

[[licenses.exceptions]]
name = "foldhash"
version = "=0.1.5"
allow = ["Zlib"]

# kube-runtime 4.2.0 reaches foldhash 0.2.0 through hashbrown 0.16;
# Zlib is OSI-permissive and MIT-equivalent in effect.
[[licenses.exceptions]]
name = "foldhash"
version = "=0.2.0"
allow = ["Zlib"]

[[licenses.exceptions]]
name = "webpki-roots"
version = "=1.0.9"
allow = ["CDLA-Permissive-2.0"]

# rustls-platform-verifier 0.7.0 packages the same Mozilla CA data under
# CDLA-Permissive-2.0, which imposes no attribution requirement.
[[licenses.exceptions]]
name = "webpki-root-certs"
version = "=1.0.9"
allow = ["CDLA-Permissive-2.0"]

[advisories]
version = 2
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "deny"

# ---------------------------------------------------------------------------
# The layering rule. Each vendor SDK may be depended on by exactly one adapter
# crate. Anything else — steward-types, steward-ports, steward-admission,
# steward-store, steward-controller, steward-apiserver, steward-mint — that
# reaches for one of these fails the build.
#
# `wrappers` is the allow-list of crates permitted to depend on the named crate.
# ---------------------------------------------------------------------------

[[bans.deny]]
name = "openshell-sdk"
wrappers = ["steward-adapter-openshell"]

[[bans.deny]]
name = "litellm-client"
wrappers = ["steward-adapter-litellm"]

[[bans.deny]]
name = "mcp-gw-client"
wrappers = ["steward-adapter-mcp-gw"]

[[bans.deny]]
name = "gouqi"                      # Jira client
wrappers = ["steward-adapter-jira"]

[[bans.deny]]
name = "spiffe"
wrappers = ["steward-adapter-spire", "steward-mint"]

# OPA is reached over HTTP by the adapter only; no core crate builds bundles.
[[bans.deny]]
name = "opa-client"
wrappers = ["steward-adapter-opa"]

# Steward builds no chat egress — AGENTS.md §8 invariant 8. Slack is reached
# through a connector (Burble), never from a core crate, so there is no wrapper
# that makes this acceptable.
[[bans.deny]]
name = "slack-morphism"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = ["https://github.com/NVIDIA/OpenShell"]
